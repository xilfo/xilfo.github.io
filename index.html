<!DOCTYPE html>
<html lang="en">
<head>

        body {

            background-color: #000;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #bg-video {
            position: fixed;

            z-index: 1;
            transform: translate(-50%, -50%) scale(1.1);
            object-fit: cover;
        }
        .overlay {

            top: 0; left: 0; width: 100%; height: 100%;

            z-index: 2;
            pointer-events: none;
        }
        .container {
            position: relative;
            width: 90%;

            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .profile-pic {
            width: 120px; height: 120px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

            margin-bottom: 40px;

            text-transform: lowercase;
            line-height: 1;
            -webkit-text-stroke: 6px black;
            paint-order: stroke fill;
        }
