<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xilfo</title>
    <style>
        /* Importing Archivo Black */
        @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            /* Using your uploaded background */
            background: #121212 url('bg.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Archivo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .profile-pic {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { 
            font-size: 2.5rem; 
            margin-bottom: 30px; 
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            color: white;
            /* Precise 2px Black Outline using Shadow Stack */
            text-shadow: 
                -2px -2px 0 #000,  
                 2px -2px 0 #000,
                -2px  2px 0 #000,
                 2px  2px 0 #000,
                -1px  0px 0 #000,
                 1px  0px 0 #000,
                 0px -1px 0 #000,
                 0px  1px 0 #000;
