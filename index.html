<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>/// COMING SOON ///</title>
    <link rel="icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Archivo', sans-serif;
            background-color: #000;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #bg-video {
            position: fixed;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            z-index: -1;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }
        .container {
            width: 90%;
            max-width: 420px;
            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 3.5rem;
            margin-bottom: 40px;
            font-weight: 900;
            letter-spacing: -3px;
            color: white;
            text-transform: lowercase;
            line-height: 1;
            -webkit-text-stroke: 11px black;
            paint-order: stroke fill;
        }
        .btn {
            display: block;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 7px;
            padding: 24px;
            color: white;
            font-weight: 900;
            font-size: 1.1rem;
            letter-spacing: 6px;
            text-decoration: none;
            margin-bottom: 15px;
            transition: transform 0.2s ease;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.02);
        }
    </style>
    <script defer src="https://cloud.umami.is/script.js" data-website-id="9f4b531d-7370-4229-8192-47ba6a0590de"></script>
</head>
<body>
    <video id="bg-video" autoplay muted loop playsinline preload="auto">
        <source src="bg.mp4" type="video/mp4">
    </video>
    <div class="container">
        <img src="https://github.com/xilfo.png" alt="xilfo" class="profile-pic">
        <h1>xilfo</h1>
        <div id="buttons"></div>
    </div>

    <script>
        ////////////////////////////////////////////////////////
        // add bittons below ///////////////////////////////////
        ////////////////////////////////////////////////////////
        const buttons = [
            { label: "/// COMING SOON ///", url: "https://xilfo.github.io/" },
            { label: "/// YOUTUBE** ///",   url: "https://www.youtube.com/watch?v=cPJUBQd-PNM" },
        ];
        // ==============================

        const container = document.getElementById("buttons");
        buttons.forEach(({ label, url }) => {
            const a = document.createElement("a");
            a.href = url;
            a.className = "btn";
            a.textContent = label;
            a.target = "_blank";
            a.rel = "noopener noreferrer";
            a.setAttribute("data-umami-event", label);
            container.appendChild(a);
        });
    </script>
</body>
</html>
