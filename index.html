<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xilfo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@900&display=swap');

        /* RESET EVERYTHING */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Archivo', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: transparent; /* No background color */
        }

        /* 1. THE MP4 (Base Layer) */
        #bg-video {
            position: fixed;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            z-index: -1; /* Keeps it behind everything */
            transform: translate(-50%, -50%);
            object-fit: cover;
            filter: brightness(0.5) contrast(1.2);
        }

        /* 2. THE UI (Top Layer) */
        .container {
            position: relative;
            width: 90%;
            max-width: 400px;
            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile-pic {
            width: 110px; height: 110px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 20px;
        }

        h1 { 
            font-size: 3.5rem;
            margin-bottom: 35px; 
            font-weight: 900;
            letter-spacing: -3px;
            color: white;
            text-transform: lowercase;
            line-height: 1;
            /* SOLID BLACK OUTLINE */
            -webkit-text-stroke: 6px black;
            paint-order: stroke fill;
        }

        .btn {
            display: block; width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            padding: 22px;
            color: white;
            font-weight: 900;
            font-size: 1rem;
            letter-spacing: 3px;
            text-decoration: none;
            margin-bottom: 12px;
            transition: 0.3s;
            text-shadow: 2px 2px 0 #000;
        }

        .btn:hover { background: rgba(255,255,255,0.1); transform: scale(1.03); }
        .pulse { animation: pulse-animation 5s infinite ease-in-out; }
        @keyframes pulse-animation { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <video id="bg-video" autoplay muted loop playsinline preload="auto">
        <source src="bg.mp4" type="video/mp4">
    </video>

    <div class="container">
        <img src="https://github.com/xilfo.png" alt="xilfo" class="profile-pic">
        <h1>xilfo</h1>
        <a href="#" class="btn pulse">/// COMING SOON ///</a>
        <a href="#" class="btn">/// DISCORD ///</a>
        <a href="#" class="btn">/// SOCIALS ///</a>
    </div>

</body>
</html>
