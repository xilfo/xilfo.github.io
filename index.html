<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xilfo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #121212 url('bg.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Archivo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .profile-pic {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { 
            font-size: 3rem; /* Slightly larger for better readability with thick outline */
            margin-bottom: 30px; 
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            color: white;
            
            /* ULTIMATE 6PX OUTLINE - Multi-layered for smoothness */
            text-shadow: 
                -6px -6px 0 #000,  6px -6px 0 #000, -6px 6px 0 #000, 6px 6px 0 #000,
                -6px  0px 0 #000,  6px  0px 0 #000,  0px -6px 0 #000, 0px 6px 0 #000,
                -3px -6px 0 #000,  3px -6px 0 #000, -3px 6px 0 #000, 3px 6px 0 #000,
                -6px -3px 0 #000,  6px -3px 0 #000, -6px 3px 0 #000, 6px 3px 0 #000;
        }

        .link-btn {
            display: block;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 15px;
            text-decoration: none;
            color: white;
            font-weight: 900;
            font-size: 1.2rem;
            text-transform: uppercase;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            
            /* 3PX OUTLINE for buttons to match your screenshot ratio */
            text-shadow: 
                -3px -3px 0 #000,  3px -3px 0 #000, -3px 3px 0 #000, 3px 3px 0 #000,
                -3px  0px 0 #000,  3px  0px 0 #000,  0px -3px 0 #000, 0px 3px 0 #000;
        }

        .link-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://github.com/xilfo.png" alt="xilfo" class="profile-pic">
        <h1>xilfo</h1>

        <a href="#" class="link-btn">Discord</a>
        <a href="#" class="link-btn">Socials</a>
        <a href="#" class="link-btn">Coming Soon</a>
    </div>

</body>
</html>
