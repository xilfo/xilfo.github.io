<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xilfo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #121212 url('bg.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Archivo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            z-index: 10;
        }

        .profile-pic {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { 
            font-size: 3.5rem; 
            margin-bottom: 30px; 
            font-weight: 900;
            /* REMOVED uppercase here */
            letter-spacing: -2px;
            color: white;
            line-height: 1;
            /* Ultra-Dense 6px Outline for smoothness */
            text-shadow: 
                6px 6px 0 #000, -6px -6px 0 #000, 6px -6px 0 #000, -6px 6px 0 #000,
                0px 6px 0 #000, 0px -6px 0 #000, 6px 0px 0 #000, -6px 0px 0 #000,
                3px 6px 0 #000, -3px 6px 0 #000, 3px -6px 0 #000, -3px -6px 0 #000,
                6px 3px 0 #000, 6px -3px 0 #000, -6px 3px 0 #000, -6px -3px 0 #000;
        }

        .link-btn {
            display: block;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            text-decoration: none;
            color: white;
            font-weight: 900;
            font-size: 1.3rem;
            /* REMOVED uppercase here */
            transition: transform 0.2s ease, background 0.2s ease;
            /* 3px Outline */
            text-shadow: 
                3px 3px 0 #000, -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000,
                0px 3px 0 #000, 0px -3px 0 #000, 3px 0px 0 #000, -3px 0px 0 #000;
        }

        .link-btn:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://github.com/xilfo.png" alt="xilfo" class="profile-pic">
        
        <h1>xilfo</h1>

        <a href="#" class="link-btn">discord</a>
        <a href="#" class="link-btn">socials</a>
        <a href="#" class="link-btn">coming soon</a>
    </div>

</body>
</html>
